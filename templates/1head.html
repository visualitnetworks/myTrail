	<script type="text/javascript">
		//Not Uppercase allow!
		const spams = new URLSearchParams(window.location.search.toLowerCase());

		var formURL = {
			pack: '../TR3-pack64/',
			zzProj: 'zzprojs/070525-1643-monteareo/',
			jsID: '',
			mode: false,
			lang: false,
			autostart: false,
			lookToward: false,
			editor: false
		}

		if (spams.has("zzproj") && spams.get("zzproj") != "") {
			formURL.zzProj = 'zzprojs/' + spams.get("zzproj") + '/';
		} else { alert('no zzProj paramURL'); }
		if (spams.has("jsid") && spams.get("jsid") != "") {
			formURL.jsID = spams.get("jsid");
		} else { alert('no jsID paramURL'); }
		if (spams.has("mode") && spams.get("mode") != "") {
			formURL.mode = spams.get("mode").toLowerCase();
		}
		if (spams.has("lang") && spams.get("lang") != "") {
			formURL.lang = spams.get("lang").toUpperCase();
		}
		if (spams.has("looktoward") && spams.get("looktoward") != "") {
			formURL.lookToward = spams.get("looktoward").split(',').map(Number);
		}
		if (spams.get("autostart") == "true") {
			formURL.autostart = true;
		}
		if (spams.get("editor") == "true") {
			formURL.editor = true;
		}

		// Load a script from given `url`
		var cScriptLoader = (function () {
			function cScriptLoader(files) {
				var _this = this;
				this.log = function (t) {
					//console.log("ScriptLoader: " + t);
				};
				this.withNoCache = function (filename) {
					/*if (filename.indexOf("?") === -1)
						filename += "?no_cache=" + new Date().getTime();
					else
						filename += "&no_cache=" + new Date().getTime();*/
					return filename;
				};
				this.loadStyle = function (filename) {
					// HTMLLinkElement
					var link = document.createElement("link");
					link.rel = "stylesheet";
					link.type = "text/css";
					link.href = _this.withNoCache(filename);
					_this.log('Loading style ' + filename);
					link.onload = function () {
						_this.log('Loaded style "' + filename + '".');
					};
					link.onerror = function () {
						_this.log('Error loading style "' + filename + '".');
					};
					_this.m_head.appendChild(link);
				};
				this.loadScript = function (i) {
					var script = document.createElement('script');
					script.type = 'text/javascript';
					if (_this.m_js_files[i].indexOf('module') > -1) { script.type = 'module'; }

					script.src = _this.withNoCache(_this.m_js_files[i]);
					var loadNextScript = function () {
						if (i + 1 < _this.m_js_files.length) {
							_this.loadScript(i + 1);
						}
					};
					script.onload = function () {
						_this.log('Loaded script "' + _this.m_js_files[i] + '".');
						loadNextScript();
					};
					script.onerror = function () {
						_this.log('Error loading script "' + _this.m_js_files[i] + '".');
						loadNextScript();
					};
					_this.log('Loading script "' + _this.m_js_files[i] + '".');
					_this.m_head.appendChild(script);
				};
				this.loadFiles = function () {
					// this.log(this.m_css_files);
					// this.log(this.m_js_files);
					for (var i = 0; i < _this.m_css_files.length; ++i)
						_this.loadStyle(_this.m_css_files[i]);
					_this.loadScript(0);
				};
				this.m_js_files = [];
				this.m_css_files = [];
				this.m_head = document.getElementsByTagName("head")[0];
				// this.m_head = document.head; // IE9+ only
				function endsWith(str, suffix) {
					if (str === null || suffix === null)
						return false;
					return str.indexOf(suffix, str.length - suffix.length) !== -1;
				}
				for (var i = 0; i < files.length; ++i) {
					if (endsWith(files[i], ".css")) {
						this.m_css_files.push(files[i]);
					}
					else if (endsWith(files[i], ".js")) {
						this.m_js_files.push(files[i]);
					}
					else
						this.log('Error unknown filetype "' + files[i] + '".');
				}
			}
			return cScriptLoader;
		})();

		var ScriptLoader = new cScriptLoader(
			[formURL.pack + 'jquery/external/jquery/jquery.js',
